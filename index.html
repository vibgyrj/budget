<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Planner</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f0f2f5;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #3f51b5;
}

.top-row {
  display: flex;
  gap: 20px;
  margin-bottom: 15px;
}

.top-row input {
  flex: 1;
}

/* MODERN INPUT WITHOUT BREAKING TABLE */
input {
  padding: 8px 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
  outline: none;
  transition: 0.2s;
}

input:focus {
  border-color: #3f51b5;
  box-shadow: 0 0 0 2px rgba(63,81,181,0.15);
}

/* TABLE KEPT EXACT STRUCTURE */
table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #3f51b5;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
}

tr:nth-child(even) {
  background: #e8eaf6;
}

/* INPUTS INSIDE TABLE (IMPORTANT FIX) */
td input {
  width: 95%;
  box-sizing: border-box;
}

.amount {
  text-align: right;
}

.total-row {
  background: #c5cae9;
  font-weight: bold;
}

.buttons {
  text-align: center;
  margin-top: 15px;
}

button {
  padding: 8px 16px;
  margin: 5px;
  background: #3f51b5;
  color: white;
  border: none;
  border-radius: 6px;
}
</style>
</head>

<body>

<h1>Budget Planner</h1>

<div class="top-row">
  <input type="text" inputmode="numeric" placeholder="₹ Budget">
  <input type="text" inputmode="numeric" placeholder="₹ Balance">
</div>

<table>
  <tr>
    <th>Item</th>
    <th>Amount (₹)</th>
  </tr>

  <!-- ROWS RESTORED -->
  <script>
    for (let i = 0; i < 10; i++) {
      document.write(`
        <tr>
          <td><input type="text" placeholder="Enter Description"></td>
          <td class="amount"><input type="text" inputmode="numeric" placeholder="Amount"></td>
        </tr>
      `);
    }
  </script>

  <tr class="total-row">
    <td>Total</td>
    <td class="amount">₹ 0</td>
  </tr>
</table>

<div class="buttons">
  <button>Download</button>
  <button>Print</button>
</div>

</body>
</html>
