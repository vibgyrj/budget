<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Planner</title>

<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: #3f51b5;
  }

  .summary {
    display: flex;
    justify-content: space-between;
    gap: 15px;
    margin-top: 20px;
  }

  .field {
    flex: 1;
  }

  .field label {
    font-weight: 600;
    color: #1a237e;
  }

  .input-box {
    display: flex;
    align-items: center;
    background: #fff;
    border-radius: 10px;
    padding: 8px 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    border: 1px solid #e0e0e0;
  }

  .prefix {
    margin-right: 6px;
  }

  .input-box input {
    border: none;
    outline: none;
    width: 100%;
    font-size: 1.3em;
    font-weight: bold;
    text-align: right;
  }

  table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
  }

  th {
    background: #3f51b5;
    color: white;
    padding: 10px;
  }

  td {
    padding: 10px;
  }

  tr:nth-child(even) td {
    background: #e8eaf6;
  }

  .amt-input {
    width: 100%;
    max-width: 120px;
    text-align: right;
    padding: 6px;
  }

  tfoot td {
    font-size: 1.4em;
    font-weight: bold;
    background: #c5cae9;
  }

  .actions {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #3f51b5;
    color: white;
    font-size: 1em;
  }

  /* PRINT STYLES */
  @media print {
    body {
      width: 80mm;
      font-size: 12px;
    }

    input, button {
      display: none;
    }

    table {
      width: 100%;
    }
  }
</style>
</head>

<body>

<h1>Budget Planner</h1>

<div class="summary">
  <div class="field">
    <label>Budget</label>
    <div class="input-box">
      ₹ <input type="text" id="budget">
    </div>
  </div>

  <div class="field">
    <label>Balance</label>
    <div class="input-box">
      ₹ <input type="text" id="balance" readonly>
    </div>
  </div>
</div>

<table>
  <thead>
    <tr>
      <th>Item</th>
      <th>Amount (₹)</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
  <tfoot>
    <tr>
      <td>Total</td>
      <td id="total">₹ 0</td>
    </tr>
  </tfoot>
</table>

<div class="actions">
  <button onclick="downloadTSV()">Download</button>
  <button onclick="window.print()">Print</button>
</div>

<script>
  const tbody = document.getElementById('rows');
  const budgetInput = document.getElementById('budget');
  const balanceEl = document.getElementById('balance');
  const totalEl = document.getElementById('total');

  // Create rows
  for (let i = 0; i < 10; i++) {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td><input type="text" placeholder="Enter Description"></td>
      <td><input type="text" class="amt-input" placeholder="Amount"></td>
    `;
    tbody.appendChild(row);
  }

  function formatINR(num) {
    return new Intl.NumberFormat('en-IN').format(num);
  }

  function parseNum(val) {
    return parseFloat(val.replace(/,/g, '')) || 0;
  }

  // Format all amount fields
  document.addEventListener('input', (e) => {
    if (e.target.classList.contains('amt-input') || e.target.id === 'budget') {
      let value = parseNum(e.target.value);
      e.target.value = value ? formatINR(value) : '';
      updateTotals();
    }
  });

  function updateTotals() {
    let total = 0;

    document.querySelectorAll('.amt-input').forEach(i => {
      total += parseNum(i.value);
    });

    totalEl.textContent = "₹ " + formatINR(total);

    let budget = parseNum(budgetInput.value);
    let balance = budget - total;

    balanceEl.value = formatINR(balance);
    balanceEl.style.color = balance < 0 ? "red" : "black";
  }

  // DOWNLOAD TSV
  function downloadTSV() {
    let rows = [["Item", "Amount"]];

    document.querySelectorAll("#rows tr").forEach(tr => {
      let text = tr.children[0].querySelector("input").value;
      let amt = tr.children[1].querySelector("input").value;
      if (text || amt) {
        rows.push([`"${text}"`, amt]);
      }
    });

    let tsv = rows.map(r => r.join("\t")).join("\n");

    let blob = new Blob([tsv], { type: "text/tab-separated-values" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "budget.tsv";
    a.click();
  }
</script>

</body>
</html>
